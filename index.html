<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pomodoro PRO</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
/* 🎨 ESTILOS BASE */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* 🌗 MODO CLARO */
.light {
    background: #f1f5f9;
    color: #0f172a;
}

/* 📦 CONTAINER PRINCIPAL */
.container {
    text-align: center;
    width: 90%;
    max-width: 350px;
    z-index: 10;
}

/* 🖼️ IMAGENS */
img {
    width: 180px;
    margin-bottom: 10px;
    transition: opacity 0.5s ease;
}

/* ⏱️ TIMER */
#timer {
    font-size: clamp(50px, 10vw, 70px);
    font-weight: bold;
    margin: 10px 0;
}

#status {
    font-size: 1.2rem;
    margin-bottom: 10px;
}

/* 📊 BARRA DE PROGRESSO */
#progress {
    height: 8px;
    background: #1e293b;
    border-radius: 10px;
    margin: 15px 0;
    overflow: hidden;
}

#bar {
    height: 100%;
    width: 0%;
    background: #22c55e;
    border-radius: 10px;
    transition: width 1s linear;
}

/* 🔘 BOTÕES */
button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #334155;
    color: white;
    font-weight: bold;
    transition: background 0.2s;
    /* Ajuste para não dar zoom no duplo clique em mobile */
    touch-action: manipulation; 
}

button:hover {
    background: #475569;
}

/* ⚠️ AVISO DE FOCO */
.warning {
    position: fixed;
    top: 0;
    width: 100%;
    background: #ef4444;
    text-align: center;
    padding: 15px 0;
    font-weight: bold;
    font-size: 1.2rem;
    display: none;
    z-index: 100;
}

/* 🌑 OVERLAY DE DISTRAÇÃO */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    z-index: 50;
}

/* 📝 CHECKLIST */
.checklist {
    position: fixed;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 200px;
    background: rgba(30, 41, 59, 0.8);
    padding: 15px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
}

.checklist h3 {
    margin-top: 0;
    font-size: 1rem;
}

.checklist input[type="text"] {
    width: calc(100% - 40px);
    padding: 8px;
    border: none;
    border-radius: 5px;
    margin-bottom: 10px;
}

.checklist ul {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 300px;
    overflow-y: auto;
}

.checklist li {
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* 🎮 JOGO */
.game-container {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 280px;
    height: 280px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* 🎵 CONTROLES DE SOM */
.sound-controls {
    margin-top: 15px;
}

.sound-controls select {
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    background: #334155;
    color: white;
    cursor: pointer;
    margin: 5px;
}

.sound-controls input[type="range"] {
    width: 150px;
    vertical-align: middle;
}

/* 📱 RESPONSIVIDADE */
@media (max-width: 768px) {
    .checklist {
        width: 150px;
        left: 5px;
        font-size: 0.9rem;
    }
    
    .game-container {
        width: 200px;
        height: 200px;
        bottom: 5px;
        right: 5px;
    }
}

@media (max-width: 480px) {
    .checklist {
        display: none;
    }
    
    .game-container {
        width: 150px;
        height: 150px;
    }
}
</style>
</head>

<body>

<div class="warning" id="warning">⚠️ VOLTA PRO FOCO!</div>
<div class="overlay" id="overlay"></div>

<div class="checklist">
    <h3>📋 Tarefas</h3>
    <input type="text" id="taskInput" placeholder="Nova tarefa...">
    <button onclick="addTask()">+</button>
    <ul id="taskList"></ul>
</div>

<div class="game-container">
    <iframe src="https://snakeprov1.netlify.app/" width="100%" height="100%" style="border: none;"></iframe>
</div>

<div class="container">
    <img id="modeImg" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Modo">

    <div id="status">Foco</div>
    <div id="timer">50:00</div>

    <div id="progress">
        <div id="bar"></div>
    </div>

    <div>Ciclos completos: <span id="cycles">0</span></div>

    <br>

    <button onpointerdown="start()">▶ Iniciar</button>
    <button onpointerdown="stop()">⏸ Parar</button>
    <button onpointerdown="toggleRain()">🔊 Som</button>

    <div class="sound-controls">
        <select onchange="changeSound(this.value)">
            <option value="rain">🌧️ Chuva</option>
            <option value="white">📻 Ruído Branco</option>
            <option value="cafe">☕ Café</option>
        </select>
        
        <br><br>
        
        Volume: <input type="range" min="0" max="1" step="0.1" value="0.5" onchange="setVolume(this.value)">
    </div>
</div>

<audio id="player" loop preload="auto">
    <source src="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg" type="audio/ogg">
</audio>

<audio id="alert" preload="auto">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
// ⏱️ CONFIGURAÇÕES DE TEMPO
let WORK = 50 * 60;
let BREAK = 10 * 60;

// 📊 ESTADO DO POMODORO
let time = WORK;
let total = WORK;
let isWork = true;
let interval = null;
let audioUnlocked = false;

// 📈 CICLOS
let cycles = parseInt(localStorage.getItem("cycles")) || 0;
document.getElementById("cycles").innerText = cycles;

// 🎵 BIBLIOTECA DE SONS
let sounds = {
    rain: "https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg",
    white: "https://actions.google.com/sounds/v1/ambiences/white_noise.ogg",
    cafe: "https://actions.google.com/sounds/v1/ambiences/coffee_shop.ogg"
};

// 🎵 TROCAR SOM
function changeSound(type){
    let player = document.getElementById("player");
    player.src = sounds[type];
    if (!player.paused) {
        player.play().catch(e => console.log("Bloqueado pelo mobile:", e));
    }
}

// 📊 ATUALIZAR INTERFACE
function update() {
    let m = Math.floor(time / 60);
    let s = time % 60;

    document.getElementById("timer").innerText =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    let percent = ((total - time) / total) * 100;
    document.getElementById("bar").style.width = percent + "%";
}

// ▶️ INICIAR POMODORO (AGORA AMIGÁVEL AO IOS/ANDROID)
function start() {
    if(interval) return;

    let player = document.getElementById("player");
    let alert = document.getElementById("alert");

    // 🔓 DESBLOQUEAR ÁUDIO (MÉTODO BRUTO PARA MOBILE)
    // No exato evento de touch/click, forçamos o play e o pause imediato.
    if(!audioUnlocked){
        player.muted = false;
        alert.muted = false;
        
        // Execução síncrona exigida pela Apple
        player.play();
        player.pause();
        
        alert.play();
        alert.pause();

        audioUnlocked = true;
    }

    // 🖥️ MODO TELA CHEIA (Ignora erro no iOS)
    try {
        if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(()=>{});
        }
    } catch(e) {}

    // ⏱️ INICIAR CONTAGEM
    interval = setInterval(() => {
        time--;
        update();
        saveState();

        if(time <= 0){
            // 🔔 TOCAR ALERTA
            alert.currentTime = 0;
            // Catch previne o crash do timer se o celular estiver em modo silencioso restrito
            alert.play().catch(e => console.log("Alerta bloqueado:", e));

            if(isWork){
                // 🎯 COMPLETOU UM CICLO
                time = BREAK;
                total = BREAK;
                document.getElementById("status").innerText = "Descanso";
                document.getElementById("modeImg").src = "https://cdn-icons-png.flaticon.com/512/3050/3050525.png";

                cycles++;
                localStorage.setItem("cycles", cycles);
                document.getElementById("cycles").innerText = cycles;
            } else {
                // 🔄 VOLTA PRO FOCO
                time = WORK;
                total = WORK;
                document.getElementById("status").innerText = "Foco";
                document.getElementById("modeImg").src = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
            }

            isWork = !isWork;
            update();
        }
    }, 1000);
}

// ⏸️ PARAR POMODORO
function stop(){
    clearInterval(interval);
    interval = null;
}

// 📝 ADICIONAR TAREFA
function addTask(){
    let input = document.getElementById("taskInput");
    let list = document.getElementById("taskList");

    if(input.value.trim() === "") return;

    let li = document.createElement("li");
    li.innerHTML = `
        <input type="checkbox" onchange="saveTasks()">
        ${input.value}
    `;

    list.appendChild(li);
    saveTasks();

    input.value = "";
}

// 💾 SALVAR TAREFAS
function saveTasks(){
    localStorage.setItem("tasks", document.getElementById("taskList").innerHTML);
}

// 📂 CARREGAR TAREFAS
function loadTasks(){
    document.getElementById("taskList").innerHTML =
        localStorage.getItem("tasks") || "";
}

// 💾 SALVAR ESTADO DO POMODORO
function saveState(){
    localStorage.setItem("pomodoro", JSON.stringify({
        time,
        total,
        isWork
    }));
}

// 📂 CARREGAR ESTADO DO POMODORO
function loadState(){
    try {
        let data = JSON.parse(localStorage.getItem("pomodoro") || "null");
        if(data){
            time = data.time;
            total = data.total;
            isWork = data.isWork;
            
            document.getElementById("status").innerText = isWork ? "Foco" : "Descanso";
            document.getElementById("modeImg").src = isWork 
                ? "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                : "https://cdn-icons-png.flaticon.com/512/3050/3050525.png";
        }
    } catch(e) {
        console.log("Erro ao carregar estado:", e);
    }
}

// 🔊 LIGAR/DESLIGAR SOM
function toggleRain(){
    let player = document.getElementById("player");
    
    if (player.paused) {
        player.play().catch(e => console.log("Play ambiente bloqueado:", e));
    } else {
        player.pause();
    }
}

// 🎚️ AJUSTAR VOLUME
function setVolume(v){
    document.getElementById("player").volume = v;
    document.getElementById("alert").volume = v;
}

// 🌗 APLICAR TEMA DO SISTEMA
function applyTheme(){
    if(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches){
        document.body.classList.add("light");
    }
}

// ⚠️ DETECTAR SAÍDA DA ABA
document.addEventListener("visibilitychange", () => {
    if(document.hidden && isWork && interval){
        document.getElementById("warning").style.display = "block";
        document.getElementById("overlay").style.display = "block";
    } else {
        document.getElementById("warning").style.display = "none";
        document.getElementById("overlay").style.display = "none";
    }
});

// 🚀 INICIALIZAÇÃO
loadTasks();
loadState();
applyTheme();
update();

// 📱 REGISTRAR SERVICE WORKER (PWA)
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
        .then(() => console.log('✅ Service Worker registrado'))
        .catch(err => console.log('❌ Erro no Service Worker:', err));
}
</script>

</body>
</html>
