<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Pomodoro</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
/* 🌗 MODO CLARO */
.light {
    background: #f1f5f9;
    color: #0f172a;
}
.container {
    text-align: center;
    width: 350px;
    z-index: 10;
}
    <!-- 📝 CHECKLIST DE TAREFAS -->
<div style="position: fixed; left: 10px; top: 50%; transform: translateY(-50%); width: 200px;">
    <h3>Tarefas</h3>
    <input type="text" id="taskInput" placeholder="Nova tarefa">
    <button onclick="addTask()">+</button>
    <ul id="taskList"></ul>
</div>
    <div style="position: fixed; bottom: 10px; right: 10px; width: 300px; height: 300px; border-radius: 12px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.5);">
    <iframe src="https://snakeprov1.netlify.app/" width="100%" height="100%" style="border: none;"></iframe>
</div> 

img {
    width: 180px;
    margin-bottom: 10px;
    transition: opacity 0.5s ease;
}

#timer {
    font-size: 70px;
    font-weight: bold;
}

#progress {
    height: 8px;
    background: #1e293b;
    border-radius: 10px;
    margin: 15px 0;
    overflow: hidden;
}

#bar {
    height: 100%;
    width: 0%;
    background: #22c55e;
    border-radius: 10px;
    transition: width 1s linear;
}

button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #334155;
    color: white;
    font-weight: bold;
    transition: background 0.2s;
}

button:hover {
    background: #475569;
}

.warning {
    position: fixed;
    top: 0;
    width: 100%;
    background: #ef4444;
    text-align: center;
    padding: 15px 0;
    font-weight: bold;
    font-size: 1.2rem;
    display: none;
    z-index: 100;
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    z-index: 50;
}
</style>
</head>

<body>

<div class="warning" id="warning">⚠️ VOLTA PRO FOCO!</div>
<div class="overlay" id="overlay"></div>

<div class="container">
    <img id="modeImg" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Modo">

    <div id="status">Foco</div>
    <div id="timer">50:00</div>

    <div id="progress"><div id="bar"></div></div>

    <div>Ciclos: <span id="cycles">0</span></div>

    <br>

    <button onclick="start()">Start</button>
    <button onclick="stop()">Stop</button>
    <button onclick="toggleRain()">Chuva</button>
    <br><br>
    Volume <input type="range" min="0" max="1" step="0.1" value="0.5" onchange="setVolume(this.value)">

    <!-- 📝 CHECKLIST DE TAREFAS -->
<div style="position: fixed; left: 10px; top: 50%; transform: translateY(-50%); width: 200px;">
    <h3>Tarefas</h3>
    <input type="text" id="taskInput" placeholder="Nova tarefa">
    <button onclick="addTask()">+</button>
    <ul id="taskList"></ul>
</div>

<audio id="player" loop></audio>
    <source src="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg" type="audio/ogg">
</audio>

<audio id="alert">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    <select onchange="changeSound(this.value)">
    <option value="rain">Chuva</option>
    <option value="white">Ruído Branco</option>
    <option value="cafe">Café</option>
</select>
</audio>

<script>
let WORK = 50 * 60;
let BREAK = 10 * 60;

let time = WORK;
let total = WORK;
let isWork = true;
let interval;
let audioUnlocked = false; // Declarada no escopo global

let cycles = localStorage.getItem("cycles") || 0;
document.getElementById("cycles").innerText = cycles;
let sounds = {
    rain: "https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg",
    white: "https://actions.google.com/sounds/v1/ambiences/white_noise.ogg",
    cafe: "https://actions.google.com/sounds/v1/ambiences/coffee_shop.ogg"
};

function changeSound(type){
    let player = document.getElementById("player");
    player.src = sounds[type];
    player.play();
}
function update() {
    let m = Math.floor(time / 60);
    let s = time % 60;

    document.getElementById("timer").innerText =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    let percent = ((total - time) / total) * 100;
    document.getElementById("bar").style.width = percent + "%";
}
// Agora vai funcionar pra PC e celular
function start() {
    if(interval) return;

    let rain = document.getElementById("player");
    let alert = document.getElementById("alert");

    // 🔥 CORREÇÃO MOBILE (obrigatório)
    rain.muted = false;
    alert.muted = false;

    rain.play().catch(()=>{});
    alert.play().catch(()=>{});

    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(()=>{});
    }

    interval = setInterval(() => {
        time--;
        update()
        saveState();

        if(time <= 0){
            alert.currentTime = 0;
            alert.play();

            if(isWork){
                time = BREAK;
                total = BREAK;
                document.getElementById("status").innerText = "Descanso";

                cycles++;
                localStorage.setItem("cycles", cycles);
                document.getElementById("cycles").innerText = cycles;
            } else {
                time = WORK;
                total = WORK;
                document.getElementById("status").innerText = "Foco";
            }

            isWork = !isWork;
            update();
        }
    }, 1000);
}
function stop(){
    clearInterval(interval);
    interval = null;
}
// 📝 SISTEMA DE TAREFAS
// 📝 SISTEMA DE TAREFAS
function addTask(){
    let input = document.getElementById("taskInput");
    let list = document.getElementById("taskList");

    if(input.value.trim() === "") return;

    let li = document.createElement("li");
    li.innerHTML = `
        <input type="checkbox">
        ${input.value}
    `;

    list.appendChild(li);
    saveTasks();

    input.value = "";
}


function saveTasks(){
    localStorage.setItem("tasks", document.getElementById("taskList").innerHTML);
}

function loadTasks(){
    document.getElementById("taskList").innerHTML =
        localStorage.getItem("tasks") || "";
}

loadTasks();
    // 💾 SALVAR ESTADO DO POMODORO
function saveState(){
    localStorage.setItem("pomodoro", JSON.stringify({
        time,
        total,
        isWork
    }));
}

function loadState(){
    let data = JSON.parse(localStorage.getItem("pomodoro"));

    if(data){
        time = data.time;
        total = data.total;
        isWork = data.isWork;
    }
}

loadState();
function toggleRain(){
    let r = document.getElementById("rain");
    
    if (r.paused) {
        r.play();
    } else {
        r.pause();
    }
}
// 🌗 DETECTA TEMA DO SISTEMA
function applyTheme(){
    if(window.matchMedia('(prefers-color-scheme: light)').matches){
        document.body.classList.add("light");
    }
}

applyTheme();
function setVolume(v){
    document.getElementById("rain").volume = v;
    document.getElementById("alert").volume = v;
}

/* DETECTAR SAÍDA DA ABA */
document.addEventListener("visibilitychange", () => {
    if(document.hidden && isWork){
        document.getElementById("warning").style.display = "block";
        document.getElementById("overlay").style.display = "block";
    } else {
        document.getElementById("warning").style.display = "none";
        document.getElementById("overlay").style.display = "none";
    }
});

update();
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('SW registrado'));
}
</script>

</body>
</html>
